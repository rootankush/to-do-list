<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To Do List</title>
  </head>
  <body>
    <div class="content">
      <div class="sidebar">
        <h1>To-Do List</h1>
        <div class="line"></div>
        <button class="sidebar-btn" id="add">
          <i data-lucide="plus-circle"></i>Add Task
        </button>
        <button class="sidebar-btn"><i data-lucide="home"></i>Home</button>
        <button class="sidebar-btn"><i data-lucide="calendar"></i>Today</button>
        <button class="sidebar-btn"><i data-lucide="list"></i>Upcoming</button>
        <button class="sidebar-btn">
          <i data-lucide="alert-circle"></i>Overdue
        </button>
        <button class="sidebar-btn">
          <i data-lucide="check-check"></i>Completed
        </button>
        <div class="line"></div>
      </div>
      <div class="main-content"></div>
    </div>
  </body>
</html>
